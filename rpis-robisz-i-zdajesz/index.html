<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RPIS — Robisz i zdajesz</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <style>
    :root {
      --bg: #0f1117;
      --panel: #1a1d27;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #7c9cff;
      --border: #2d3142;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }
    nav {
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 1.25rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    nav h1 {
      font-size: 1rem;
      margin: 0 0 .25rem;
      color: var(--accent);
    }
    nav p {
      font-size: .8rem;
      color: var(--muted);
      margin: 0 0 1rem;
    }
    nav a {
      display: block;
      color: var(--text);
      text-decoration: none;
      padding: .45rem .6rem;
      border-radius: 6px;
      font-size: .9rem;
      margin-bottom: 2px;
    }
    nav a:hover, nav a.active {
      background: #252a3a;
      color: var(--accent);
    }
    main {
      padding: 2rem 2.5rem 4rem;
      max-width: 820px;
    }
    #content h1 { font-size: 1.75rem; margin-top: 0; }
    #content h2 {
      margin-top: 2rem;
      padding-bottom: .35rem;
      border-bottom: 1px solid var(--border);
    }
    #content h3 { margin-top: 1.5rem; color: var(--accent); }
    #content table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
    }
    #content th, #content td {
      border: 1px solid var(--border);
      padding: .5rem .75rem;
      text-align: left;
    }
    #content th { background: var(--panel); }
  #content blockquote {
      border-left: 3px solid var(--accent);
      margin: 1rem 0;
      padding: .5rem 1rem;
      background: var(--panel);
      color: var(--muted);
    }
    .katex-display { margin: 1.25rem 0; overflow-x: auto; }
    .loading { color: var(--muted); }
    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
      nav { height: auto; position: relative; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <nav>
      <h1>RPIS</h1>
      <p>Robisz i zdajesz — wzory renderowane w przeglądarce</p>
      <a href="#" data-file="README.md">Start</a>
      <a href="#" data-file="ODPOWIEDZI.md">Odpowiedzi</a>
      <hr style="border-color:var(--border);margin:1rem 0">
      <a href="#" data-file="rozdzial_01_kombinatoryka.md">I — Kombinatoryka</a>
      <a href="#" data-file="rozdzial_02_prawdopodobienstwo.md">II — Prawdopodobieństwo</a>
      <a href="#" data-file="rozdzial_03_bayes.md">III — Bayes</a>
      <a href="#" data-file="rozdzial_04_bernoulli.md">IV — Bernoulli</a>
      <a href="#" data-file="rozdzial_05_ciagly.md">V — Zmienne ciągłe</a>
      <a href="#" data-file="rozdzial_06_oczekiwana_wariancja.md">VI — E(X), Var(X)</a>
      <a href="#" data-file="rozdzial_07_funkcje_zl.md">VII — Funkcje z.l.</a>
      <a href="#" data-file="rozdzial_08_normalny.md">VIII — Normalny</a>
      <a href="#" data-file="rozdzial_09_wektory.md">IX — Wektory</a>
      <a href="#" data-file="rozdzial_10_warunkowe.md">X — Warunkowe</a>
      <a href="#" data-file="rozdzial_11_dwumianowy.md">XI — Dwumianowy</a>
      <a href="#" data-file="rozdzial_13_test_t.md">XIII — Test t</a>
      <a href="#" data-file="rozdzial_14_test_srednia.md">XIV — Test z</a>
    </nav>
    <main>
      <div id="content" class="loading">Ładowanie…</div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script>
    const content = document.getElementById('content');
    const links = document.querySelectorAll('nav a[data-file]');

    async function loadChapter(file) {
      content.innerHTML = '<p class="loading">Ładowanie…</p>';
      links.forEach(a => a.classList.toggle('active', a.dataset.file === file));
      try {
        const res = await fetch(file);
        if (!res.ok) throw new Error(res.statusText);
        const md = await res.text();
        content.innerHTML = marked.parse(md);
        renderMathInElement(content, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$', right: '$', display: false }
          ],
          throwOnError: false
        });
        history.replaceState(null, '', '?rozdzial=' + encodeURIComponent(file));
      } catch (e) {
        content.innerHTML = '<p>Nie udało się wczytać pliku. Uruchom serwer: <code>python server.py</code> i wejdź na <code>/rpis-robisz-i-zdajesz/</code></p>';
      }
    }

    links.forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        loadChapter(a.dataset.file);
      });
    });

    const params = new URLSearchParams(location.search);
    const start = params.get('rozdzial') || 'rozdzial_01_kombinatoryka.md';
    loadChapter(start);
  </script>
</body>
</html>
